<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Transamerica Branding</title>
  <desc id="desc">Transamerica-inspired branding panel with pyramid icon and wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f8fb"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g transform="translate(120,120)">
    <polygon points="150,20 280,260 20,260" fill="#e51b24"/>
    <polygon points="150,62 236,220 64,220" fill="#f2565c"/>
    <line x1="150" y1="20" x2="150" y2="260" stroke="#ffffff" stroke-width="6" opacity="0.85"/>
    <line x1="106" y1="102" x2="194" y2="102" stroke="#ffffff" stroke-width="5" opacity="0.65"/>
    <line x1="85" y1="141" x2="215" y2="141" stroke="#ffffff" stroke-width="5" opacity="0.65"/>
    <line x1="64" y1="180" x2="236" y2="180" stroke="#ffffff" stroke-width="5" opacity="0.65"/>
  </g>
  <g transform="translate(450,220)">
    <text x="0" y="70" font-family="Arial, Helvetica, sans-serif" font-size="108" font-weight="700" fill="#0c3d7a">Transamerica</text>
    <text x="2" y="140" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="500" fill="#3b4b63">Branding Material</text>
  </g>
</svg>
